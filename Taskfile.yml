version: '3'

tasks:
  build:
    desc: Build ./bin/weft-runner-forgejo (linux/arm64 by default; override with GOOS/GOARCH).
    cmds:
      - mkdir -p ./bin
      - CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o ./bin/weft-runner-forgejo .

  test:
    desc: Run unit tests.
    cmds:
      - go test ./...

  vet:
    desc: go vet.
    cmds:
      - go vet ./...

  cross:
    desc: Cross-build linux/arm64 + linux/amd64 + darwin/arm64 into ./bin/.
    cmds:
      - mkdir -p ./bin
      - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o ./bin/weft-runner-forgejo.linux-arm64 .
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o ./bin/weft-runner-forgejo.linux-amd64 .
      - CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath -o ./bin/weft-runner-forgejo.darwin-arm64 .

  clean:
    cmds:
      - rm -rf ./bin
